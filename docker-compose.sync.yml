services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 8080
      SYNC_API_KEY: ${SYNC_API_KEY:-change-this-long-random-key}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://gmod:gmod@postgres:5432/gmod_sync
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gmod
      POSTGRES_PASSWORD: gmod
      POSTGRES_DB: gmod_sync
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  redis-data:
  postgres-data:
